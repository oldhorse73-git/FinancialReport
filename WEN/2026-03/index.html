<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能合約溯源系統 POC</title>
    <style>
        /* 明亮科技風格 CSS */
        :root {
            --primary-color: #0061FF; /* 科技藍 */
            --hover-color: #004ecc;
            --bg-color: #F4F7FE;
            --panel-bg: #FFFFFF;
            --border-color: #E2E8F0;
            --text-main: #1E293B;
            --text-muted: #64748B;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; height: 100vh; margin: 0; background-color: var(--bg-color); color: var(--text-main);
        }
        
        /* 左側文件區 */
        .html-container { 
            flex: 6; 
            border-right: 1px solid var(--border-color); 
            background: var(--panel-bg);
            box-shadow: 2px 0 10px rgba(0,0,0,0.03);
            z-index: 10;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* 右側 AI 面板區 */
        .data-panel { 
            flex: 4; padding: 30px; overflow-y: auto; 
        }
        .header { margin-bottom: 30px; }
        .header h2 { margin: 0; font-size: 24px; font-weight: 700; color: var(--primary-color); display: flex; align-items: center; gap: 8px;}
        .header p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 14px; }
        
        /* 數據表格設計 */
        table { 
            width: 100%; border-collapse: separate; border-spacing: 0; 
            background: var(--panel-bg); border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #F8FAFC; font-weight: 600; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;}
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #F1F5F9; }
        
        /* 科技感跳轉按鈕 */
        .jump-btn { 
            padding: 8px 16px; background-color: var(--primary-color); color: white; 
            border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
            transition: all 0.2s ease; box-shadow: 0 2px 4px rgba(0, 97, 255, 0.2);
            display: flex; align-items: center; gap: 6px;
        }
        .jump-btn:hover { background-color: var(--hover-color); transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0, 97, 255, 0.3);}
        .jump-btn:active { transform: translateY(0); }
        .jump-btn::before { content: "✨"; font-size: 14px;}
    </style>
</head>
<body>
